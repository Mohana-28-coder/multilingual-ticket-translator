version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    environment:
      - DATABASE_URL=sqlite:///./tickets.db
      - SECRET_KEY=your-super-secret-key-change-in-production-2024
      - OLLAMA_BASE_URL=[ollama](http://ollama:11434)
    depends_on:
      - ollama
    networks:
      - mtt-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    environment:
      - REACT_APP_API_URL=[localhost](http://localhost:8000/api)
    depends_on:
      - backend
    networks:
      - mtt-network

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - mtt-network

networks:
  mtt-network:
    driver: bridge

volumes:
  ollama-data: